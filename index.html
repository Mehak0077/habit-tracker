<!DOCTYPE html>
<html>
<head>
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>My Habit Tracker</h1>

    <div class="habit">
        <input type="checkbox" id="Namaz">
        <label>Namaz</label>
    </div>

    <div class="habit">
        <input type="checkbox" id="Quran Recitation">
        <label>Quran Recitation</label>
    </div>

    <div class="habit">
        <input type="checkbox" id="10K Steps">
        <label>10K Steps</label>
    </div>

    <div class="habit">
        <input type="checkbox" id="Stretching + Pilates">
        <label>Stretching + Pilates</label>
    </div>

    <div class="habit">
        <input type="checkbox" id="Learn + Implement Skill">
        <label>Learn + Implement Skill</label>
    </div>

    <div class="habit">
        <input type="checkbox" id="2L Water">
        <label>2L Water</label>
    </div>

    <div class="habit">
        <input type="checkbox" id="Reduce Sugar">
        <label>Reduce Sugar</label>
    </div>
    <p id="counter">Completed Today: 0 / 7</p>
    <p id="percentage">Success Rate: 0%</p>
    <button id="resetBtn">Reset Day</button>
    <script src="script.js"></script>

</body>
</html>
